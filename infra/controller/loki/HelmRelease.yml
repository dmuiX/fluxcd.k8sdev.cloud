# yaml-language-server: $schema=../../../values-schemas/loki/helmrelease.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: loki
  targetNamespace: monitoring
  chart:
    spec:
      chart: loki
      version: 11.5.0
      sourceRef:
        kind: HelmRepository
        name: loki
      interval: 6h
  values:
    deploymentMode: SingleBinary
    lokiCanary:
      resources:
        limits:
          memory: 256Mi
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      storage:
        type: filesystem
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 10Gi
    monitoring:
      serviceMonitor:
        enabled: true
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

  dependsOn:
    - name: kube-prometheus-stack
    - name: longhorn
