---
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: external-dns
  targetNamespace: external-dns
  chart:
    spec:
      chart: external-dns
      version: 1.19.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
      interval: 6h
  values:
    domainFilters:
      - h-lab.org
    sources:
      - gateway-tlsroute
      - gateway-httproute
      - gateway-udproute
    logLevel: debug
    txtPrefix: external-dns
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-token
            key: token
    provider: cloudflare
    registry: noop
    policy: upsert-only
    serviceMonitor:
      enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
  dependsOn:
    - name: cilium
    - name: cert-manager
    - name: kube-prometheus-stack
