# yaml-language-server: $schema=../../../values-schemas/kube-prometheus-stack/helmrelease.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 15m0s
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.5.0
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
      interval: 6h
  values:
    crds:
      enabled: true
      upgradeJob:
        enabled: true
    fullnameOverride: monitoring
    namespaceOverride: monitoring
    prometheus:
      prometheusSpec:
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi
        serviceMonitorSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
    prometheusOperator:
      resources:
        requests:
          cpu: 20m
          memory: 25Mi
        limits:
          memory: 256Mi
    grafana:
      admin:
        existingSecret: grafana-credentials
        userKey: user
        passwordKey: password
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: grafana-dashboards
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/grafana-dashboards
      dashboards:
        grafana-dashboards:
          flux2:
            gnetId: 16714
            revision: 1
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          k8s-dashboard:
            gnetId: 15661
            revision: 4
            datasource:
              - name: DS__VICTORIAMETRICS-PROD-ALL
                value: Prometheus
          external-dns:
            gnetId: 15038
            revision: 3
          cert-manager:
            gnetId: 20842
            revision: 3
          longhorn:
            gnetId: 16888
            revision: 11
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          loki-metrics:
            gnetId: 17781
            revision: 1
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          external-secrets:
            gnetId: 21640
            revision: 4
            datasource:
              - name: DS_METRICS
                value: Prometheus
          cloudnative-pg:
            gnetId: 20417
            revision: 4
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
              - name: DS_EXPRESSION
                value: __expr__
          flagger:
            gnetId: 15158
            revision: 5
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          k8up:
            gnetId: 20166
            revision: 4
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          openbao:
            gnetId: 23725
            revision: 1
            datasource:
              - name: DS_PROMXY
                value: Prometheus
          hubble-l7-http-by-workload:
            gnetId: 19423
            revision: 1
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.monitoring:3100
          access: proxy
          isDefault: false
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
    alertmanager:
      alertmanagerSpec:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 10m
          memory: 25Mi
        limits:
          memory: 256Mi
  dependsOn:
    - name: cert-manager
    - name: cilium
    - name: longhorn
    - name: openbao
    - name: external-secrets
