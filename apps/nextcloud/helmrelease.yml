---
apiVersion: v1
kind: Namespace
metadata:
  name: nextcloud
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nextcloud
  namespace: flux-system
spec:
  interval: 24h
  url: https://nextcloud.github.io/helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  chart:
    spec:
      chart: nextcloud
      version: 9.0.4
      sourceRef:
        kind: HelmRepository
        name: nextcloud
      interval: 6h
  values:
    replicaCount: 3
    nextcloud:
      trustedDomains: nextcloud.k8sdev.cloud
  releaseName: nextcloud
  targetNamespace: nextcloud
  install:
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
