---
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sealed-secrets
  namespace: flux-system
spec:
  interval: 24h
  url: https://bitnami-labs.github.io/sealed-secrets/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: sealed-secrets
  targetNamespace: sealed-secrets
  chart:
    spec:
      chart: sealed-secrets
      version: 2.18.4
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
      interval: 6h
  values:
    fullnameOverride: sealed-secrets
    namespace: sealed-secrets
