---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-pushgateway
  namespace: flux-system
spec:
  interval: 10m0s
  releaseName: prometheus-pushgateway
  targetNamespace: monitoring
  chart:
    spec:
      chart: prometheus-pushgateway
      version: 2.16.0
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
      interval: 6h
  values:
    serviceMonitor:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
  dependsOn:
    - name: kube-prometheus-stack
