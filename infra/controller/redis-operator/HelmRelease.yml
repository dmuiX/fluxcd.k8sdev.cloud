# yaml-language-server: $schema=../../../values-schemas/redis-operator/helmrelease.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: redis-operator
  targetNamespace: redis-operator
  chart:
    spec:
      chart: redis-operator
      version: 0.24.0
      sourceRef:
        kind: HelmRepository
        name: redis-operator
      interval: 6h
  values:
    replicas: 3
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
