---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: flux-system
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    name: ghcr-credentials #secret in cluter
  data:
    - secretKey: password #secretKey in cluster
      remoteRef:
        key: ghcr-credentials #key in provider
        property: password #property in provider
        decodingStrategy: None # can be None, Base64, Base64URL or Auto
    - secretKey: username #secretKey in cluster
      remoteRef:
        key: ghcr-credentials #key in provider
        property: username #property in provider
        decodingStrategy: None # can be None, Base64, Base64URL or Auto
