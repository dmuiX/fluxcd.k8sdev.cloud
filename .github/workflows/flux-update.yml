name: flux-update

on:
  push:
    paths:
      - .github/workflows/flux-update.yml
    branches-ignore:
      - main
  workflow_dispatch:

env:
  FLUX_VERSION: v2.8.3 # renovate: depName=fluxcd/flux2 datasource=github-releases

jobs:
  flux-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Cache Flux CLI
        uses: actions/cache@v4
        id: cache-flux
        with:
          path: /usr/local/bin/flux
          key: flux-${{ env.FLUX_VERSION }}

      - name: Install Flux CLI
        if: steps.cache-flux.outputs.cache-hit != 'true'
        run: |
          VERSION=${{ env.FLUX_VERSION }}
          curl -sL "https://github.com/fluxcd/flux2/releases/download/${VERSION}/flux_${VERSION#v}_linux_amd64.tar.gz" -o flux.tar.gz
          curl -sL "https://github.com/fluxcd/flux2/releases/download/${VERSION}/flux_${VERSION#v}_checksums.txt" -o checksums.txt
          sha256sum --check --ignore-missing checksums.txt
          tar -xzf flux.tar.gz flux
          sudo mv flux /usr/local/bin/flux
          rm flux.tar.gz checksums.txt

      - name: Update gotk-components.yaml
        run: |
          flux install --version=${{ env.FLUX_VERSION }} --export > clusters/flux-system/gotk-components.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clusters/flux-system/gotk-components.yaml
          git commit -m "chore(flux): update gotk-components to ${{ env.FLUX_VERSION }}"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Flux Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ env.FLUX_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
