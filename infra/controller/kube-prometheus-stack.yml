---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 15m0s
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 83.4.0
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
      interval: 6h
  values:
    crds:
      enabled: true
    fullnameOverride: monitoring
    namespaceOverride: monitoring
    prometheus:
      prometheusSpec:
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi
        serviceMonitorSelector: {} # accept any serviceMonitor that has serviceMonitor: enabled
        serviceMonitorSelectorNilUsesHelmValues: false
    grafana:
      admin:
        existingSecret: grafana-credentials
        userKey: user
        passwordKey: password
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: grafana-dashboards
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/grafana-dashboards
      dashboards:
        grafana-dashboards:
          flux2: # https://grafana.com/grafana/dashboards/16714
            gnetId: 16714
            revision: 1
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          k8s-dashboard: # https://grafana.com/grafana/dashboards/15661
            gnetId: 15661
            revision: 4
            datasource:
              - name: "DS__VICTORIAMETRICS-PROD-ALL"
                value: Prometheus
          external-dns: 
            gnetId: 15038
            revision: 3
          cert-manager: # https://grafana.com/grafana/dashboards/20842
            gnetId: 20842
            revision: 3
          longhorn: # https://grafana.com/grafana/dashboards/16888
            gnetId: 16888
            revision: 11
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          loki-metrics: # https://grafana.com/grafana/dashboards/17781
            gnetId: 17781
            revision: 1
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          external-secrets: # https://grafana.com/grafana/dashboards/21640
            gnetId: 21640
            revision: 4
            datasource:
              - name: DS_METRICS
                value: Prometheus
          cloudnative-pg: # https://grafana.com/grafana/dashboards/20417
            gnetId: 20417
            revision: 4
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
              - name: DS_EXPRESSION
                value: __expr__
          flagger: # https://grafana.com/grafana/dashboards/15158
            gnetId: 15158
            revision: 5
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          k8up: # https://grafana.com/grafana/dashboards/20166
            gnetId: 20166
            revision: 4
            datasource:
              - name: DS_PROMETHEUS
                value: Prometheus
          openbao: # https://grafana.com/grafana/dashboards/23725
            gnetId: 23725
            revision: 1
            datasource:  
              - name: DS_PROMXY
                value: Prometheus
          hubble-l7-http-by-workload: # https://grafana.com/grafana/dashboards/19423 (Isovalent official)
            gnetId: 19423
            revision: 1
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.monitoring:3100
          access: proxy
          isDefault: false
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
    alertmanager:
      alertmanagerSpec:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
  dependsOn:
    - name: cert-manager
    - name: cilium
    - name: longhorn
    - name: openbao
    - name: external-secrets
