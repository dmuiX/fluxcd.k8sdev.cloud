---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: controller-sync
  namespace: flux-system
spec:
  dependsOn:
    - name: crds-sync
  interval: 5m0s
  retryInterval: 2m0s
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: infra/controller
  prune: true
  wait: true
  patches:
    - patch: |-
        - op: add
          path: /spec/driftDetection
          value:
            mode: warn
            ignore:
              - paths: ["/spec/replicas"]
                target:
                  kind: Deployment
              - paths: ["/status"]
                target:
                  kind: Certificate
                  group: cert-manager.io
        - op: add
          path: /spec/install
          value:
            createNamespace: false
            remediation:
              retries: 3
            crds: CreateReplace
        - op: add
          path: /spec/upgrade
          value:
            remediation:
              retries: 3
            crds: Skip
        - op: add
          path: /spec/test
          value:
            enable: true
            ignoreFailures: false
      target:
        kind: HelmRelease
        group: helm.toolkit.fluxcd.io
