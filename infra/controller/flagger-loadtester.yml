---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger-loadtester
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: flagger-loadtester
  targetNamespace: flagger
  chart:
    spec:
      chart: loadtester
      version: 0.36.0
      sourceRef:
        kind: HelmRepository
        name: flagger
      interval: 6h
  values:
    replicaCount: 3
    podDisruptionBudget.enabled: true
  dependsOn:
    - name: flagger
