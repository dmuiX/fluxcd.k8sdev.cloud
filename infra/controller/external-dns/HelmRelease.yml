# yaml-language-server: $schema=../../../values-schemas/external-dns/helmrelease.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: external-dns
  targetNamespace: external-dns
  chart:
    spec:
      chart: external-dns
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
      interval: 6h
  values:
    domainFilters:
      - k8sdev.cloud
    sources:
      - gateway-tlsroute
      - gateway-httproute
      - gateway-udproute
    logLevel: debug
    txtPrefix: external-dns
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-token
            key: token
    provider: cloudflare
    registry: noop
    policy: upsert-only
    serviceMonitor:
      enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
  dependsOn:
    - name: cilium
    - name: cert-manager
    - name: kube-prometheus-stack
