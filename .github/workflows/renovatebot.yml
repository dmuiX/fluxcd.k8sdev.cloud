name: renovatebot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  issues:
    types: [ edited ]

concurrency:
  group: renovatebot
  cancel-in-progress: false

jobs:
  renovatebot:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issues' ||
      (github.event.issue.title == 'Dependency Dashboard' && github.event.sender.type == 'User')
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Self-hosted Renovate
        id: renovate
        uses: renovatebot/github-action@v46.1.8
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: ${{ github.repository_owner }} <${{ github.repository_owner }}@users.noreply.github.com>
          RENOVATE_LOG_FILE: ${{ runner.temp }}/renovate-log.ndjson
          RENOVATE_LOG_FILE_LEVEL: info

      - name: Summary
        if: always()
        run: |
          {
            echo "## Renovate Run"
            echo ""
            echo "- **Status:** ${{ steps.renovate.outcome }}"
            echo "- **Triggered by:** ${{ github.event_name }}"
            echo "- **Run at:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            LOG_FILE="${{ runner.temp }}/renovate-log.ndjson"
            if [ -f "$LOG_FILE" ]; then
              python3 .github/renovate-summary.py "$LOG_FILE" 2>/dev/null || echo "- (log parsing failed)"
            else
              echo "- No log file found at \`$LOG_FILE\`"
              echo "- Contents of runner.temp:"
              ls "${{ runner.temp }}" 2>&1 | sed 's/^/  - /' || true
            fi
            echo ""
            echo "[Dependency Dashboard](https://github.com/${{ github.repository }}/issues?q=is%3Aissue+Dependency+Dashboard)"
            echo "[Open Renovate PRs](https://github.com/${{ github.repository }}/pulls?q=is%3Apr+is%3Aopen+author%3Aapp%2Frenovate)"
          } >> "$GITHUB_STEP_SUMMARY"
