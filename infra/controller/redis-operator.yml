---
apiVersion: v1
kind: Namespace
metadata:
  name: redis-operator
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: redis-operator
  namespace: flux-system
spec:
  interval: 24h
  url: https://ot-container-kit.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: redis-operator
  targetNamespace: redis-operator
  chart:
    spec:
      chart: redis-operator
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: redis-operator
      interval: 6h
  values:
    crds:
      enabled: true
    replicaCount: 3
    podDisruptionBudget:
      enabled: true
    enableCertificateOwnerRef: true # will delete secrets when certificate ressource is deleted
    config:
      apiVersion: controller.config.redis-operator.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    dns01RecursiveNameservers: 1.1.1.1:53,9.9.9.9:53
