---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 24h
  url: https://grafana-community.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: loki
  targetNamespace: monitoring
  chart:
    spec:
      chart: loki
      version: 9.3.3
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 6h
