---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.external-secrets.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: external-secrets
  targetNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
      interval: 6h
  values:
    installCRDs: true
    replicaCount: 3
    certManager:
      enabled: true
      cert:
        issuer:
          kind: ClusterIssuer
          name: letsencrypt
    serviceMonitor:
      enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
  dependsOn:
    - name: cert-manager
    - name: cilium
    - name: longhorn
    - name: openbao
