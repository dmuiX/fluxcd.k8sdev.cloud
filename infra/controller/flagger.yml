---
apiVersion: v1
kind: Namespace
metadata:
  name: flagger
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flagger
  namespace: flux-system
spec:
  interval: 24h
  url: https://flagger.app
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: flagger
  targetNamespace: flagger
  chart:
    spec:
      chart: flagger
      version: 1.42.0
      sourceRef:
        kind: HelmRepository
        name: flagger
      interval: 6h
  values:
    leaderElection:
      enabled: true
      replicaCount: 3
    podDisruptionBudget.enabled: true
    prometheus.install: false
    meshProvider: gatewayapi
    metricsServer: http://monitoring-prometheus:9090
  dependsOn:
    - name: cert-manager
    - name: cilium
    - name: longhorn
    - name: openbao
    - name: external-secrets
    - name: external-dns
    - name: kube-prometheus-stack
