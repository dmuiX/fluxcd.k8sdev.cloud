# yaml-language-server: $schema=../../../values-schemas/longhorn/helmrelease.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: longhorn
  targetNamespace: longhorn
  chart:
    spec:
      chart: longhorn
      version: 1.11.1
      sourceRef:
        kind: HelmRepository
        name: longhorn
      interval: 6h
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      createDefaultDiskLabeledNodes: "false"
      guaranteedInstanceManagerCPU: 12
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 3
      reclaimPolicy: Retain
    service:
      ui:
        type: ClusterIP
    metrics:
      serviceMonitor:
        enabled: true
    longhornManager:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
  dependsOn:
    - name: cilium
    - name: cert-manager
