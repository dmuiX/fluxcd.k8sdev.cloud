# yaml-language-server: $schema=../../../values-schemas/external-secrets/helmrelease.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: external-secrets
  targetNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
      interval: 6h
  values:
    installCRDs: true
    replicaCount: 3
    serviceMonitor:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
  dependsOn:
    - name: cert-manager
    - name: cilium
    - name: longhorn
    - name: openbao
