---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vscode-server
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  chart:
    spec:
      chart: vscode-server
      version: 2026.04.11-47add6d
      sourceRef:
        kind: HelmRepository
        name: vscode-server
      interval: 6h
  values:
    image:
      repository: ghcr.io/dmuix/vscode-server-dockerized
    imagePullSecrets:
      - name: ghcr-pullsecret
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    user:
      existingSecret: vscode-server-credentials
      userKey: username
      passwordKey: password
  releaseName: vscode-server
  targetNamespace: vscode-server
  install:
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths:
          - /spec/replicas
