# yaml-language-server: $schema=../../../values-schemas/cert-manager/helmrelease.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: cert-manager
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: v1.20.1
      sourceRef:
        kind: HelmRepository
        name: cert-manager
      interval: 6h
  values:
    crds:
      enabled: true
    podDisruptionBudget:
      enabled: true
    enableCertificateOwnerRef: true
    config:
      apiVersion: controller.config.cert-manager.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    dns01RecursiveNameservers: 1.1.1.1:53,9.9.9.9:53
