---
apiVersion: v1
kind: Namespace
metadata:
  name: k8up
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: k8up
  namespace: flux-system
spec:
  interval: 24h
  url: https://k8up-io.github.io/k8up
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8up
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: k8up
  targetNamespace: k8up
  chart:
    spec:
      chart: k8up
      version: 4.9.0
      sourceRef:
        kind: HelmRepository
        name: k8up
      interval: 6h
  values:
    replicaCount: 3
    metrics:
      serviceMonitor:
        enabled: true
      grafanaDashboard:
        enabled: true
        