---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  chart:
    spec:
      chart: podinfo
      version: 6.*.*
      sourceRef:
        kind: HelmRepository
        name: podinfo
      interval: 6h
  values:
    replicaCount: 2
  releaseName: podinfo
  targetNamespace: podinfo
  install:
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
    - paths:
      - /spec/replicas
