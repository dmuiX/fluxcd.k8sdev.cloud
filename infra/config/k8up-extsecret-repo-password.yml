---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: repo-password
spec:
  refreshTime: 24h
  externalSecretName: repo-password
  externalSecretSpec:
    target:
      name: repo-password #secret in cluter
    data:
      - secretKey: password #secretKey in cluster
        remoteRef:
          key: repo-password #key in provider
          version: v1
          property: password #property in provider
          decodingStrategy: None # can be None, Base64, Base64URL or Auto
    secretStoreRef:
      kind: ClusterSecretStore
      name: openbao-backend
  # when using ClusterExternalSecret, you can specify which namespaces can access the secret in this way:
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - k8up
