# yaml-language-server: $schema=../../../values-schemas/cloudnative-pg/helmrelease.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 5m0s
  releaseName: cloudnative-pg
  targetNamespace: cloudnative-pg
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
      interval: 6h
  values:
    replicaCount: 3
    monitoring:
      podMonitorEnabled: true
  dependsOn:
    - name: cert-manager
    - name: cilium
    - name: longhorn
    - name: openbao
    - name: external-secrets
