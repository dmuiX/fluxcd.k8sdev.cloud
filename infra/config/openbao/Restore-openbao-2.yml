---
apiVersion: k8up.io/v1
kind: Restore
metadata:
  name: openbao-2-k8up-restore
  namespace: openbao
spec:
  backend:
    repoPasswordSecretRef:
      name: k8up-repo-password
      key: password
    s3:
      endpoint: https://e7b3567ace974b8838999da5f1858701.eu.r2.cloudflarestorage.com
      bucket: k8sdev-backups
      accessKeyIDSecretRef:
        name: r2-credentials
        key: access-key-id
      secretAccessKeySecretRef:
        name: r2-credentials
        key: secret-access-key
  restoreMethod:
    folder:
      claimName: data-openbao-2
  paths: [ "/data/openbao-0" ]
